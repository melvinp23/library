<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Library</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>

    <body>
        <button id="new-book-btn" command="show-modal" commandfor="my-dialog">New Book</button>

        <dialog id="my-dialog">
            <form action="" id="form" style="display: none;">
                <div>
                    <label for="title">Book Title:</label>
                    <input type="text" name="title" id="title" required />
                </div>

                <div>
                    <label for="author">Author:</label>
                    <input type="text" name="author" id="author" required />
                </div>

                <div>
                    <label for="pages"># of pages:</label>
                    <input type="number" name="pages" id="pages" required />
                </div>

                <div>
                    <label for="read">Status: </label>
                    <select name="status" id="status" class="u-full-width">
                        <option value="read">Read</option>
                        <option value="not read">Not read</option>
                    </select>
                </div>

                <div>
                    <!-- <input type="submit" name="submit" value="Add Book" /> -->
                    <button type='submit' name="submit" id="submit-button">Add Book</button>
                </div>
            </form>

            <div>
                <button commandfor="my-dialog" command="close">Close</button>
            </div>
        </dialog>

        <div id="library-container"></div>

    </body>

</html>
